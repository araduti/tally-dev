services:
  db:
    image: postgres:18
    restart: unless-stopped
    environment:
      POSTGRES_USER: tally
      POSTGRES_PASSWORD: tally
      POSTGRES_DB: tally
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tally"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:8-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  garage:
    image: dxflrs/garage:v1.1.0
    restart: unless-stopped
    ports:
      - "3900:3900"
    volumes:
      - garagedata:/var/lib/garage/data
      - garagemeta:/var/lib/garage/meta
    # Note: dxflrs/garage is a scratch-based image with no shell or
    # networking utilities, so a traditional healthcheck is not possible.
    # Docker will restart the container on crash via restart: unless-stopped.

volumes:
  pgdata:
  garagedata:
  garagemeta:
