services:
  db:
    image: postgres:18
    restart: unless-stopped
    environment:
      POSTGRES_USER: tally
      POSTGRES_PASSWORD: tally
      POSTGRES_DB: tally
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:8-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  garage:
    image: dxflrs/garage:v1.1.0
    restart: unless-stopped
    ports:
      - "3900:3900"
    volumes:
      - garagedata:/var/lib/garage/data
      - garagemeta:/var/lib/garage/meta

volumes:
  pgdata:
  garagedata:
  garagemeta:
