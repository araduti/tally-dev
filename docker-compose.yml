name: tally-dev

services:
  db:
    image: postgres:18
    restart: unless-stopped
    environment:
      POSTGRES_USER: tally
      POSTGRES_PASSWORD: tally
      POSTGRES_DB: tally
    ports:
    - "127.0.0.1:5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tally"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:8-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  garage:
    image: dxflrs/garage:v1.1.0
    restart: unless-stopped
    ports:
      - "127.0.0.1:3900:3900"
      - "127.0.0.1:3902:3902"
    volumes:
      - ./garage.toml:/etc/garage.toml
      - garagedata:/var/lib/garage/data
      - garagemeta:/var/lib/garage/meta

volumes:
  pgdata:
  garagedata:
  garagemeta: